<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOLLCHAT</title>
    <style>
        :root {
            --bg-color: #050505; /* Darker background for the real app */
            --container-bg: #121212;
            --card-bg: #1a1a1a;
            --text-color: #f8fafc;
            --text-muted: #888;
            --primary: #ffffff;
            --primary-hover: #e0e0e0;
            --error: #ef4444;
            --border-color: #333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Disguise View Styles --- */
        .disguise-container {
            background-color: #1e293b;
            padding: 2.5rem 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        .disguise-header { margin-bottom: 2rem; }
        .disguise-lock-icon { font-size: 3rem; margin-bottom: 0.5rem; }
        .disguise-container h1 { font-size: 1.5rem; margin: 0; font-weight: 600; letter-spacing: 1px; }
        .disguise-question-section { margin-bottom: 2rem; }
        .disguise-math-question { font-size: 1.25rem; font-weight: 500; margin-bottom: 0.5rem; }
        .disguise-instruction { color: #94a3b8; font-size: 0.875rem; margin-bottom: 1rem; }
        
        .disguise-input-group { position: relative; margin-bottom: 1rem; }
        .disguise-input {
            width: 100%; padding: 0.75rem; background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid #334155; border-radius: 0.5rem; color: #f8fafc;
            font-size: 1rem; text-align: center; box-sizing: border-box; outline: none;
        }
        .disguise-input:focus { border-color: #3b82f6; }
        
        .disguise-button {
            width: 100%; padding: 0.75rem; background-color: #3b82f6; color: white;
            border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 500;
            cursor: pointer; margin-bottom: 1.5rem;
        }
        .disguise-button:hover { background-color: #2563eb; }
        
        .disguise-footer-link { color: #94a3b8; font-size: 0.875rem; text-decoration: none; cursor: pointer; }
        .disguise-footer-link:hover { color: #f8fafc; }
        .error-message { color: var(--error); font-size: 0.875rem; margin-top: 0.5rem; min-height: 1.2rem; }

        /* --- Real App Styles --- */
        #app-view {
            display: none;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
        }

        .app-topbar {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
            position: relative;
            margin-top: 20px;
        }

        .help-icon {
            position: absolute;
            left: 0;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .app-title {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 8px 0;
        }

        .welcome-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
            max-width: 280px;
            line-height: 1.4;
        }

        .login-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .input-wrapper {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .input-label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .app-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
            font-size: 1rem;
            padding: 8px 0;
            outline: none;
            transition: border-color 0.2s;
        }

        .app-input:focus {
            border-bottom-color: var(--text-color);
        }

        .app-input::placeholder {
            color: #444;
        }

        .eye-icon {
            position: absolute;
            right: 0;
            top: 28px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .forgot-link:hover {
            color: var(--text-color);
        }

        .login-btn {
            width: 100%;
            background-color: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: var(--primary-hover);
        }

        .lock-back-btn {
            width: 40px;
            height: 40px;
            background-color: #222;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 1px solid #333;
            margin-bottom: auto;
        }

        .lock-back-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
        }

        .signup-footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: var(--text-muted);
            padding-bottom: 20px;
        }

        .signup-link {
            color: var(--text-color);
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Main Login / Disguise View -->
    <div class="disguise-container" id="login-view">
        <div class="disguise-header">
            <div class="disguise-lock-icon">🔒</div>
            <h1>SOLLCHAT</h1>
        </div>

        <div class="disguise-question-section">
            <div class="disguise-math-question">What is 74 - 52 ?</div>
            <div class="disguise-instruction">Enter the answer</div>
            
            <div class="disguise-input-group">
                <input type="password" class="disguise-input" id="answer-input" inputmode="numeric" placeholder="Answer..." autocomplete="off">
                <div class="error-message" id="login-error"></div>
            </div>
            
            <button class="disguise-button" onclick="checkPassword()">Submit</button>
        </div>

        <div class="disguise-footer-link" onclick="showSetup()">
            First time? Set your password
        </div>
    </div>

    <!-- Setup View -->
    <div class="disguise-container" id="setup-view" style="display: none;">
        <div class="disguise-header">
            <div class="disguise-lock-icon">⚙️</div>
            <h1>Setup Password</h1>
        </div>

        <div class="disguise-question-section">
            <div class="disguise-math-question">Set Your Password</div>
            <div class="disguise-instruction">Choose a 4 to 8 digit number</div>
            
            <div class="disguise-input-group">
                <input type="password" class="disguise-input" id="setup-input" inputmode="numeric" placeholder="4-8 digits" autocomplete="off" maxlength="8">
                <div class="error-message" id="setup-error"></div>
            </div>
            
            <button class="disguise-button" onclick="savePassword()">Save Password</button>
        </div>

        <div class="disguise-footer-link" onclick="showLogin()">
            Back to login
        </div>
    </div>

    <!-- Real App Login View -->
    <div id="app-view">
        <div class="app-topbar">
            <div class="help-icon" onclick="placeholderAlert('Help / Info')">?</div>
            <h1 class="app-title">SOLLCHAT</h1>
        </div>

        <div class="welcome-section">
            <h2 class="welcome-title">Welcome Back</h2>
            <p class="welcome-subtitle">Enter your credentials to access the vault.</p>
        </div>

        <div class="login-card">
            <div class="input-wrapper">
                <label class="input-label">USERNAME</label>
                <input type="text" class="app-input" placeholder="e.g. Satoshi_N" id="real-user">
            </div>

            <div class="input-wrapper">
                <label class="input-label">PASSWORD</label>
                <input type="password" class="app-input" placeholder="••••••••" id="real-pass">
                <div class="eye-icon" onclick="togglePassword()">👁️</div>
            </div>

            <div class="forgot-link" onclick="placeholderAlert('Forgot Password')">
                Forgot password?
            </div>

            <button class="login-btn" onclick="realLogin()">Login</button>
        </div>

        <!-- Small lock back button -->
        <div class="lock-back-btn" onclick="lockApp()" title="Lock App">
            <svg viewBox="0 0 24 24">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
        </div>

        <div class="signup-footer">
            New here? <span class="signup-link" onclick="placeholderAlert('Sign Up')">Sign up</span>
        </div>
    </div>

    <script>
        const loginView = document.getElementById('login-view');
        const setupView = document.getElementById('setup-view');
        const appView = document.getElementById('app-view');
        
        const answerInput = document.getElementById('answer-input');
        const setupInput = document.getElementById('setup-input');
        
        const loginError = document.getElementById('login-error');
        const setupError = document.getElementById('setup-error');
        
        const realPassInput = document.getElementById('real-pass');

        // Allow pressing Enter to submit
        answerInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
        
        setupInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') savePassword();
        });

        function showSetup() {
            loginView.style.display = 'none';
            appView.style.display = 'none';
            setupView.style.display = 'block';
            document.body.style.backgroundColor = '#0f172a'; // Restore disguise bg
            setupInput.value = '';
            setupError.innerText = '';
            setupInput.focus();
        }

        function showLogin() {
            setupView.style.display = 'none';
            appView.style.display = 'none';
            loginView.style.display = 'block';
            document.body.style.backgroundColor = '#0f172a'; // Restore disguise bg
            answerInput.value = '';
            loginError.innerText = '';
            answerInput.focus();
        }

        function showApp() {
            loginView.style.display = 'none';
            setupView.style.display = 'none';
            appView.style.display = 'flex'; // Use flex for layout
            document.body.style.backgroundColor = '#050505'; // Darker bg for real app
        }

        function savePassword() {
            const pwd = setupInput.value.trim();
            
            // Validate: Must be numbers only and between 4 and 8 digits
            if (!/^\d{4,8}$/.test(pwd)) {
                setupError.innerText = 'Must be 4 to 8 numbers.';
                return;
            }

            // Save to localStorage
            localStorage.setItem('soulchat_pwd', pwd);
            
            // Switch back to login
            showLogin();
            // Show a little success flash or just let them login
            loginError.style.color = '#10b981'; // Green
            loginError.innerText = 'Password saved! Try logging in.';
            setTimeout(() => {
                loginError.style.color = 'var(--error)';
                if(loginError.innerText.includes('saved')) loginError.innerText = '';
            }, 3000);
        }

        function checkPassword() {
            const entered = answerInput.value.trim();
            const stored = localStorage.getItem('soulchat_pwd');

            if (!stored) {
                loginError.innerText = 'No password set. Click "First time?" below.';
                return;
            }

            if (entered === stored) {
                // Success! Unlock app
                showApp();
            } else {
                // To maintain disguise, we can either say "Incorrect" or "Wrong answer"
                loginError.innerText = 'Incorrect answer.';
                answerInput.value = '';
                answerInput.focus();
            }
        }

        function lockApp() {
            // Clears any real login fields when locking
            document.getElementById('real-user').value = '';
            document.getElementById('real-pass').value = '';
            showLogin();
        }

        function togglePassword() {
            if (realPassInput.type === "password") {
                realPassInput.type = "text";
            } else {
                realPassInput.type = "password";
            }
        }

        function placeholderAlert(pageName) {
            alert(`Navigating to: ${pageName}\n(To be created later!)`);
        }
        
        function realLogin() {
            const user = document.getElementById('real-user').value;
            const pass = document.getElementById('real-pass').value;
            if(!user || !pass) {
                alert('Please enter both username and password.');
                return;
            }
            alert(`Logged in successfully as ${user}!\n(Chat interface to be built next)`);
        }
    </script>
</body>
</html>
